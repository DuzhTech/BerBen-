<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuzhTech | Адмін Панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #111827;
            --sidebar-hover: #1F2937;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --accent: #3B82F6;
            --success: #10B981;
            --danger: #EF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { display: flex; height: 100vh; background-color: var(--bg-color); color: var(--text-main); }

        /* Сайдбар */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); color: white; display: flex; flex-direction: column; padding: 20px 0; }
        .logo { font-size: 24px; font-weight: 700; padding: 0 24px 30px; border-bottom: 1px solid #374151; margin-bottom: 20px; letter-spacing: 1px;}
        .logo span { color: var(--accent); }
        .menu-item { padding: 12px 24px; margin: 4px 12px; border-radius: 8px; cursor: pointer; color: #D1D5DB; font-weight: 500; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .menu-item:hover, .menu-item.active { background-color: var(--sidebar-hover); color: white; }
        .menu-item.active { background-color: var(--accent); }

        /* Основний контент */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; font-weight: 600; }
        .btn-primary { background-color: var(--accent); color: white; padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background-color: #2563EB; }

        /* Картка і Таблиця */
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #E5E7EB; margin-bottom: 20px; padding-bottom: 10px; }
        .tab { color: var(--text-muted); font-weight: 500; cursor: pointer; padding-bottom: 10px; margin-bottom: -11px; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px; color: var(--text-muted); font-weight: 500; font-size: 14px; border-bottom: 1px solid #E5E7EB; }
        td { padding: 16px; border-bottom: 1px solid #E5E7EB; font-size: 14px; color: var(--text-main); vertical-align: middle; }
        tr:hover td { background-color: #F9FAFB; }
        
        /* Статуси */
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .badge.new { background-color: #DBEAFE; color: #1E40AF; }
        .badge.confirmed { background-color: #D1FAE5; color: #065F46; }
        .badge.cancelled { background-color: #FEE2E2; color: #991B1B; }

        .client-info strong { display: block; margin-bottom: 4px; }
        .client-info span { color: var(--text-muted); font-size: 13px; }
    </style>
</head>
